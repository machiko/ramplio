version: "2"

# golangci-lint v2 設定格式(v1 的 linters-settings / issues.exclude-rules 已改制):
# - linters-settings → linters.settings
# - issues.exclude-rules → linters.exclusions.rules
# - gofmt 在 v2 屬 formatters,不在 linters
# - gosimple 已併入 staticcheck,不再單獨列出
linters:
  enable:
    - errcheck # 未處理的 error 回傳值
    - staticcheck # 靜態分析,含 SA 系列與原 gosimple 規則
    - govet # go vet 內建檢查
    - unused # 未使用的程式碼
    - gocritic # 額外的慣用寫法建議
    - misspell # 英文拼寫錯誤
  settings:
    errcheck:
      # 終端/buffer 輸出的錯誤無可行處理,排除避免百餘處 `_ =` 噪音;
      # Close 家族刻意不排除——寫入側的 close 錯誤是真風險,逐站處理。
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Fprint
    govet:
      enable:
        - shadow # 變數遮蔽
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      disabled-checks:
        # metrics.Summary 以值傳遞是刻意設計:不可變快照語意(見 CLAUDE.md
        # 架構契約與 coding-style 的 immutability 原則)。複製只發生在
        # 報告期,不在壓測 hot path(hot path 走 chan metrics.Sample)。
        # 改 74 個簽名為指標會顛覆設計換取無關緊要的複製節省。
        - hugeParam
        - rangeValCopy
  exclusions:
    rules:
      - path: '_test\.go'
        linters:
          - errcheck # 測試中允許不檢查 error(如 t.Log)

formatters:
  enable:
    - gofmt # 格式化一致性

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
