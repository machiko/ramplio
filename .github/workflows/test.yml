# CI 品質閘門 — PR 與 main push 必跑
# 本地驗證:go run github.com/rhysd/actionlint/cmd/actionlint@latest
name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        run: go build ./...
      - name: Test with race detector
        run: go test -race ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: golangci-lint
        # v6 只會安裝 golangci-lint v1(1.59.x),看不懂 .golangci.yml 的
        # version: "2" 設定格式;v8 起支援 golangci-lint v2。
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
