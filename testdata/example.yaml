name: example smoke test

stages:
  - duration: 30s
    target: 50
  - duration: 60s
    target: 50
  - duration: 30s
    target: 0

steps:
  - name: GET health check
    method: GET
    url: https://httpbin.org/status/200
    headers:
      Accept: application/json
    assertions:
      status: 200

  - name: POST echo
    method: POST
    url: https://httpbin.org/post
    headers:
      Content-Type: application/json
    body: '{"probe": true}'
    assertions:
      status: 200

thresholds:
  error_rate_pct: 1.0
  p99_ms: 1000
